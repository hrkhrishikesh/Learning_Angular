<h1>Pipes In Angular</h1>>
<hr>
<h2>{{title}}</h2>
<h3>{{title | uppercase}}</h3>
<h3>{{title | lowercase}}</h3>
<hr>
<h2>{{date}}</h2>
<h3>{{date | date}}</h3>
<h3>{{date | date:'full'}}</h3>

<h3>Similarly there are currency</h3>
<hr>
<h1>Custom Pipes in Angular - Currency Converter</h1>
<h3>{{amount|currencyConverter:15}}</h3>
