<h1>This is a homepage</h1>
<p>Welcome to the homepage!</p>

@if (isAuthInitialized() && isLoggedIn()) {
	<section class="user-details">
		<h2>Signed-in User Details</h2>
		<p><strong>Name:</strong> {{ userName() || 'N/A' }}</p>
		<p><strong>Email:</strong> {{ userEmail() || 'N/A' }}</p>
		<p><strong>Tenant ID:</strong> {{ tenantId() || 'N/A' }}</p>
	</section>
}

<a [routerLink]="['/profile', {name:'hrk'}]">Go to Profile Page</a>
<br>
<h2>Another way to pass data using function in ts file</h2>
<button (click)="gotoprofile()">Go to profile page</button>
<br>
<button (click)="callGetApi()">Call 5000/getApi (GET)</button>
